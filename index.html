    --card:#3A2A3A;
    --primary:#FF9EC4;
    --primary-ink:#FFD6E8;
    --secondary:#7FD4EC;
    --secondary-ink:#D9F4FF;
    --accent:#FFD97A;
    --accent-ink:#FFF0C7;
    --text:#FBEFFA;
    --text-soft:#C9A8C4;
    --border:#4A3849;
    --shadow: 0 10px 30px -12px rgba(0,0,0,0.5);
    --shadow-lift: 0 18px 44px -16px rgba(0,0,0,0.6);
    --neg:#FF8FA3;
    --pos:#7ED6A5;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  button{ transition: transform .15s cubic-bezier(.22,1,.36,1), opacity .15s ease; }
  button:active{ transform:scale(.95); }
  .fade-in{ animation:fadeIn .45s cubic-bezier(.22,1,.36,1) both; }
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Athiti', sans-serif;
    -webkit-font-smoothing:antialiased;
    transition:background .35s ease, color .35s ease;
    overscroll-behavior-y:none;
  }
  .serif{ font-family:'Trirong', serif; }
  html.lang-th .serif{ font-family:'Athiti', sans-serif; }
  html.lang-th .amount-input{ font-family:'Athiti', sans-serif; }
  #shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding-bottom:110px;
    background:var(--bg);
  }
  @media (min-width:520px){
    #shell{ box-shadow: var(--shadow-lift); min-height:100vh; }
    body{ background: linear-gradient(180deg,var(--bg),var(--bg)); }
  }
  ::-webkit-scrollbar{ display:none; }
  * { scrollbar-width:none; }

  .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--text-soft); font-weight:700;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .hero-card{
    background: linear-gradient(160deg, var(--card) 55%, var(--bg-secondary) 130%);
  }
  .hero-orb{
    position:absolute; border-radius:50%; pointer-events:none; z-index:0;
    filter:blur(2px);
  }
  .hero-orb-1{ width:180px; height:180px; top:-70px; right:-60px; background:var(--secondary); opacity:.16; }
  .hero-orb-2{ width:120px; height:120px; bottom:-50px; left:-40px; background:var(--accent); opacity:.14; }
  .hero-stat{
    flex:1; min-width:0; border-radius:16px; padding:10px 8px 11px;
  }
  .icon-chip{
    width:44px; height:44px; border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .icon-chip svg{ width:20px; height:20px; }

  /* header */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(var(--bg) 70%, transparent);
    padding:22px 20px 6px;
  }

  /* wallet cards */
  .wallet-scroll{
    display:flex; gap:14px; overflow-x:auto; padding:4px 20px 10px;
    scroll-snap-type:x mandatory;
  }
  .wallet-card{
    scroll-snap-align:start;
    min-width:216px; height:140px;
    border-radius:24px; padding:20px;
    position:relative; overflow:hidden;
    color:#3A3A3A;
    display:flex; flex-direction:column; justify-content:space-between;
    box-shadow: var(--shadow-lift);
    transition:transform .25s cubic-bezier(.22,1,.36,1);
  }
  .wallet-card:active{ transform:scale(.96); }
  .wallet-card::after{
    content:''; position:absolute; right:-34px; top:-34px;
    width:130px; height:130px; border-radius:50%;
    background:rgba(255,255,255,.22);
  }
  .wallet-card::before{
    content:''; position:absolute; left:-24px; bottom:-30px;
    width:80px; height:80px; border-radius:50%;
    background:rgba(255,255,255,.12);
  }
  .wallet-card .wtop{ display:flex; justify-content:space-between; align-items:flex-start; z-index:1;}
  .wallet-card .wicon{
    width:36px; height:36px; border-radius:12px; background:rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center;
  }
  .wallet-card .wicon svg{ width:17px; height:17px; }
  .wallet-add{
    min-width:120px; height:140px; border-radius:24px;
    border:1.5px dashed var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; color:var(--text-soft); font-size:12px; font-weight:600;
    flex-shrink:0;
  }
  .quick-pill{
    flex-shrink:0; display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:10px 16px 10px 10px; cursor:pointer; transition:transform .15s ease;
  }
  .quick-pill:active{ transform:scale(.95); }

  /* nav */
  .navbar{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:16px; width:calc(100% - 32px); max-width:448px;
    background:var(--card); border:1px solid var(--border);
    border-radius:28px; box-shadow:var(--shadow-lift);
    display:flex; align-items:center; justify-content:space-around;
    padding:10px 6px; z-index:40;
  }
  .navbtn{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--text-soft); background:none; border:none; padding:6px 10px;
    font-size:10px; font-weight:700; letter-spacing:.02em; cursor:pointer;
    transition:color .2s ease;
  }
  .navbtn svg{ width:21px; height:21px; transition:transform .2s ease; }
  .navbtn.active{ color:var(--accent-color-ink); }
  .navbtn.active svg{ transform:translateY(-1px) scale(1.05); }
  .fab{
    width:56px; height:56px; border-radius:50%;
    background:var(--text); color:var(--bg);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 24px -8px rgba(0,0,0,.35);
    margin-top:-34px; border:5px solid var(--bg);
    transition:transform .18s ease;
  }
  html.dark .fab{ background:var(--card); color:var(--text); }
  .fab:active{ transform:scale(.9) rotate(90deg); }
  .fab svg{ width:24px; height:24px; }

  /* sheet */
  .sheet-overlay{
    position:fixed; inset:0; background:rgba(30,28,25,.42);
    z-index:60; opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }
  .sheet{
    position:fixed; left:50%; bottom:0; transform:translate(-50%,100%);
    width:100%; max-width:480px; background:var(--card);
    border-radius:28px 28px 0 0; z-index:61; padding:10px 20px 26px;
    transition:transform .38s cubic-bezier(.22,1,.36,1);
    max-height:88vh; overflow-y:auto;
  }
  .sheet.open{ transform:translate(-50%,0); }
  .sheet-handle{ width:38px; height:5px; border-radius:3px; background:var(--border); margin:6px auto 14px; }

  .segmented{
    display:flex; background:var(--bg); border:1px solid var(--border);
    border-radius:16px; padding:4px; gap:4px;
  }
  .segmented button{
    flex:1; padding:9px 0; border:none; background:transparent; border-radius:12px;
    font-family:inherit; font-weight:700; font-size:13px; color:var(--text-soft);
    cursor:pointer; transition:all .2s ease;
  }
  .segmented button.active{ background:var(--card); color:var(--accent-color-ink); box-shadow:var(--shadow); }

  .amount-input{
    font-family:'Trirong', serif; font-size:52px; font-weight:600;
    text-align:center; width:100%; border:none; background:transparent;
    color:var(--text); outline:none;
  }
  .amount-input::placeholder{ color:var(--border); }

  .field-row{
    display:flex; align-items:center; gap:12px; padding:14px 4px;
    border-bottom:1px solid var(--border);
  }
  .field-row:last-child{ border-bottom:none; }
  .field-row input, .field-row textarea, .field-row select{
    border:none; background:transparent; outline:none; font-family:inherit;
    font-size:15px; color:var(--text); width:100%; font-weight:600;
  }
  .field-row textarea{ resize:none; font-weight:500; }

  .pill-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .pill{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:10px 4px; border-radius:16px; border:1.5px solid transparent;
    cursor:pointer; transition:all .2s cubic-bezier(.22,1,.36,1);
  }
  .pill.selected{ border-color:var(--accent-color); transform:scale(1.06); }
  .pill span{ font-size:10.5px; font-weight:700; color:var(--text-soft); text-align:center; }
  .pill.selected span{ color:var(--text); font-weight:800; }

  .save-btn{
    width:100%; padding:18px; border:none; border-radius:19px;
    background:var(--accent-color); color:var(--accent-color-ink); font-family:inherit;
    font-weight:800; font-size:16px; letter-spacing:.01em; cursor:pointer;
    margin-top:16px; transition:transform .15s cubic-bezier(.22,1,.36,1), background .25s ease, color .25s ease;
  }
  .save-btn:active{ transform:scale(.97); }

  /* timeline */
  .day-group{ padding:0 20px; margin-bottom:22px; }
  .day-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; padding-left:2px;}
  .day-title{ font-size:13px; font-weight:800; }
  .day-sub{ font-size:11px; color:var(--text-soft); font-weight:600; }
  .tl-row{
    display:flex; align-items:center; gap:12px; padding:11px 4px 11px 14px;
    border-left:2px solid var(--border); position:relative;
  }
  .tl-row::before{
    content:''; position:absolute; left:-5px; top:50%; transform:translateY(-50%);
    width:8px; height:8px; border-radius:50%; background:var(--border);
  }
  .tl-swipe-wrap{ position:relative; overflow:hidden; padding-left:6px; margin-left:-6px; }
  .tl-swipe-delete{
    position:absolute; top:0; right:0; bottom:0; width:76px;
    background:var(--neg); color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .tl-swipe-content{ background:var(--card); position:relative; touch-action:pan-y; will-change:transform; }
  .tl-time{ font-size:10.5px; color:var(--text-soft); font-weight:700; width:36px; flex-shrink:0; }

  .progress-track{ height:8px; border-radius:6px; background:var(--bg); border:1px solid var(--border); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:6px; transition:width .5s ease; }

  .chip{
    padding:7px 13px; border-radius:14px; border:1px solid var(--border);
    font-size:12px; font-weight:700; color:var(--text-soft); background:var(--card);
    white-space:nowrap; cursor:pointer; transition:all .18s cubic-bezier(.22,1,.36,1);
    display:inline-block;
  }
  .chip.active{ background:var(--accent-color); color:var(--accent-color-ink); border-color:var(--accent-color); transform:scale(1.05); }

  .toast{
    position:fixed; left:50%; bottom:110px; transform:translate(-50%,20px);
    background:var(--text); color:var(--bg); padding:12px 20px; border-radius:16px;
    font-size:13px; font-weight:700; z-index:80; opacity:0; pointer-events:none;
    transition:all .3s cubic-bezier(.22,1,.36,1); box-shadow:var(--shadow-lift);
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  input[type=range]{ -webkit-appearance:none; height:6px; border-radius:4px; background:var(--border); }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--text); cursor:pointer; }

  .swatch{ width:30px; height:30px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch.selected{ border-color:var(--text); }

  .icon-svg{
    width:20px; height:20px; flex-shrink:0;
    fill:none; stroke:currentColor; stroke-width:2;
    stroke-linecap:round; stroke-linejoin:round;
  }

  .app-hidden{ display:none !important; }
  .auth-screen{
    position:fixed; inset:0; max-width:480px; margin:0 auto;
    background:var(--bg); z-index:100;
    display:flex; flex-direction:column; justify-content:center;
    padding:32px 28px; overflow-y:auto;
  }
  .auth-screen.hidden{ display:none; }
  .auth-field{
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:12px;
  }
  .auth-field input{
    border:none; background:transparent; outline:none; font-family:inherit;
    font-size:14.5px; color:var(--text); width:100%; font-weight:600;
  }
  .auth-error{
    background:color-mix(in srgb, var(--accent) 20%, transparent); color:var(--neg); font-size:12.5px; font-weight:700;
    padding:10px 14px; border-radius:12px; margin-bottom:12px; display:none;
  }
  .auth-error.show{ display:block; }

  /* full-screen page overlay (wallet detail) */
  .page-overlay{
    position:fixed; inset:0; max-width:480px; margin:0 auto;
    background:var(--bg); z-index:70;
    transform:translateX(100vw); transition:transform .38s cubic-bezier(.22,1,.36,1);
    overflow-y:auto; padding-bottom:40px;
  }
  .page-overlay.open{ transform:translateX(0); }
  .page-head{
    display:flex; align-items:center; gap:14px; padding:20px; position:sticky; top:0;
    background:var(--bg); z-index:2;
  }
  .back-btn{
    width:38px; height:38px; border-radius:50%; border:1px solid var(--border);
    background:var(--card); display:flex; align-items:center; justify-content:center; flex-shrink:0;
    cursor:pointer;
  }

  /* calendar */
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; padding:0 4px; }
  .cal-dow{ text-align:center; font-size:10.5px; font-weight:800; color:var(--text-soft); padding-bottom:6px; }
  .cal-cell{
    aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:14px; cursor:pointer; position:relative; gap:2px;
  }
  .cal-cell .num{ font-size:12.5px; font-weight:700; }
  .cal-cell.faded{ opacity:.28; }
  .cal-cell.selected{ background:var(--text); color:var(--bg); }
  .cal-cell.today:not(.selected){ border:1.5px solid var(--text); }
  .cal-dots{ display:flex; gap:2px; height:5px; }
  .cal-dot{ width:4px; height:4px; border-radius:50%; }

  /* photo attachment */
  .photo-thumb{ width:44px; height:44px; border-radius:14px; object-fit:cover; flex-shrink:0; }
  .photo-preview-wrap{ position:relative; display:inline-block; }
  .photo-remove{
    position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:50%;
    background:var(--text); color:var(--bg); border:2px solid var(--card); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .photo-remove svg{ width:12px; height:12px; }
  .attach-btn{
    display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:14px;
    border:1.5px dashed var(--border); color:var(--text-soft); font-size:12.5px; font-weight:700;
    cursor:pointer; background:none; font-family:inherit;
  }
</style>
</head>

// Appending a hex alpha suffix directly after a var() reference (e.g. "var(--primary)55")
// is NOT valid CSS — the browser silently drops the whole declaration. color-mix()
// is the correct way to get a translucent tint of a CSS custom property's value.
function mixAlpha(colorVar, alphaHex){
  const pct = Math.round((parseInt(alphaHex,16)/255)*100);
  return `color-mix(in srgb, ${colorVar} ${pct}%, transparent)`;
}

// all). Real accounts never keep this data; see resetToBlankData() below.
const _DEMO_SNAPSHOT = JSON.stringify(buildBackupObject());
function resetToDemoData(){
  applyBackup(JSON.parse(_DEMO_SNAPSHOT));
  state.tab = 'home';
}

// A genuinely new account should start empty, not with fake demo data.
// One starter "Cash" wallet is included so Add Transaction has somewhere
// to point to right away; everything else — transactions, budgets,
// recurring, quick log items, installments, goal — starts blank.
function resetToBlankData(){
  const keepLang = state.lang, keepDark = state.dark, keepAccent = state.accentKey, keepTheme = state.theme;
  applyBackup({
    wallets: [{id:newId(), name:'Cash', type:'Cash', icon:'wallet', color:'primary', initial:0, desc:''}],
    categories: JSON.parse(JSON.stringify(state.categories)), // keep category taxonomy (not personal data)
    transactions: [],
    budgets: [],
    recurring: [],
    goal: null,
    quickItems: [],
    installments: [],
    loans: [],
    accentKey: keepAccent, dark: keepDark, lang: keepLang, theme: keepTheme,
  });
  state.tab = 'home';
}

/* ---------------- HELPERS ---------------- */
const fmt = n => '฿' + Math.round(n).toLocaleString('en-US');
const fmtSigned = (n,type) => (type==='income' ? '+ ' : type==='expense' ? '\u2212 ' : '') + fmt(Math.abs(n));
const catById = id => state.categories.find(c=>c.id===id);
const walletById = id => state.wallets.find(w=>w.id===id);
const iconEl = (name) => `<svg class="icon-svg"><use href="#icon-${name}"></use></svg>`;

// Animated circular progress ring (Apple Health style). Uses a native SVG
// <animate> so it plays automatically whenever inserted, no JS timing needed.
function ringSVG(pct, opts={}){
  const size = opts.size || 64, stroke = opts.stroke || 8;
  const color = opts.color || 'var(--accent-color)', track = opts.track || 'var(--border)';
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const clamped = Math.min(100, Math.max(0, pct));
  const offset = c * (1 - clamped/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg); flex-shrink:0;">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}">
      <animate attributeName="stroke-dashoffset" from="${c}" to="${offset}" dur="0.85s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </circle>
  </svg>`;
}

function walletBalance(id){
  const w = walletById(id); if(!w) return 0;
  let bal = w.initial;
  state.transactions.forEach(t=>{
    if(t.type==='income' && t.walletId===id) bal += t.amount;
    if(t.type==='expense' && t.walletId===id) bal -= t.amount;
    if(t.type==='transfer'){
      if(t.walletId===id) bal -= t.amount;
      if(t.toWalletId===id) bal += t.amount;
    }
  });
  return bal;
}
function totalBalance(){ return state.wallets.reduce((s,w)=>s+walletBalance(w.id),0); }

// "Safe to spend" — real cash on hand, minus what's already spoken for:
// bills due this month you haven't paid yet, one installment payment per
// active plan, and money you owe friends. BNPL wallets are deliberately
// excluded from "cash on hand" since that's borrowed capacity, not money
// you actually have.
function safeToSpendCalc(){
  const cash = state.wallets
    .filter(w=> w.type!==BNPL_TYPE)
    .reduce((s,w)=> s+walletBalance(w.id), 0);

  const now = new Date();
  const billsDue = state.recurring
    .filter(r=> r.type==='expense' && r.nextDue)
    .filter(r=>{
      const d = new Date(r.nextDue+'T12:00:00');
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && daysUntil(r.nextDue)>=0;
    })
    .reduce((s,r)=> s+r.amount, 0);

  const installmentDue = state.installments
    .filter(inst=> inst.paid < inst.installments && inst.nextDue)
    .filter(inst=>{
      const d = new Date(inst.nextDue+'T12:00:00');
      return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && daysUntil(inst.nextDue)>=0;
    })
    .reduce((s,inst)=> s + Math.round(inst.totalAmount/inst.installments), 0);

  const owed = state.loans
    .filter(l=> !l.settled && l.direction==='borrowed')
    .reduce((s,l)=> s+l.amount, 0);

  const safe = cash - billsDue - installmentDue - owed;
  return { cash, billsDue, installmentDue, owed, safe };
}
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isSameMonth(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth(); }
function daysAgoDate(n){ const d=new Date(); d.setDate(d.getDate()-n); return d; }
function spentToday(){
  const now = new Date();
  return state.transactions.filter(t=>t.type==='expense' && isSameDay(new Date(t.date), now))
    .reduce((s,t)=>s+t.amount,0);
}
function monthTotals(offsetMonths=0){
  const ref = new Date(); ref.setMonth(ref.getMonth()-offsetMonths);
  let income=0, expense=0;
  const catTotals = {};
  state.transactions.forEach(t=>{
    const d = new Date(t.date);
    if(!isSameMonth(d, ref)) return;
    if(t.type==='income') income += t.amount;
    if(t.type==='expense'){ expense += t.amount; catTotals[t.categoryId]=(catTotals[t.categoryId]||0)+t.amount; }
  });
  return {income, expense, catTotals};
}
function greeting(){
  const h = new Date().getHours();
  if(h<5) return tr('greeting_late');
  if(h<12) return tr('greeting_morning');
  if(h<17) return tr('greeting_afternoon');
  if(h<21) return tr('greeting_evening');
  return tr('greeting_night');
}
function showToast(msg, icon='check', action=null){
  const t = document.getElementById('toast');
  t.innerHTML = `${iconEl(icon)} <span style="flex:1;">${msg}</span>${action ? `<button onclick="${action.onclick}" style="border:none;background:none;color:var(--bg);font-family:inherit;font-weight:800;font-size:13px;text-decoration:underline;padding:0 0 0 6px;cursor:pointer;">${action.label}</button>` : ''}`;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), action ? 4000 : 2200);
}

function renderDueSoonBanner(){
  const DUE_WINDOW_DAYS = 5;
  const recurItems = state.recurring
    .filter(r=> r.nextDue)
    .map(r=> ({ kind:'recurring', id:r.id, name:r.name, icon:r.icon, type:r.type, daysLeft: daysUntil(r.nextDue) }));
  const instItems = state.installments
    .filter(inst=> inst.nextDue && inst.paid < inst.installments)
    .map(inst=> ({ kind:'installment', id:inst.id, name:inst.name, icon:inst.icon, type:'expense', daysLeft: daysUntil(inst.nextDue) }));

  const items = [...recurItems, ...instItems]
    .filter(x=> x.daysLeft <= DUE_WINDOW_DAYS)
    .sort((a,b)=> a.daysLeft - b.daysLeft);
  if(!items.length) return '';

  return `
  <div style="padding:14px 20px 0;">
    <div class="card fade-in" style="padding:6px 16px; border-color:var(--accent-color);">
      <div style="padding:12px 2px 8px; display:flex; align-items:center; gap:8px;">
        ${iconEl('calendar-days')}
        <div style="font-weight:800; font-size:12.5px;">${trf('due_soon_title', items.length)}</div>
      </div>
      ${items.map((x,i)=>`
        <div style="display:flex; align-items:center; gap:12px; padding:11px 0; ${i===items.length-1?'':'border-bottom:1px solid var(--border);'}">
          <div class="icon-chip" style="width:36px;height:36px;background:${mixAlpha(COLORS.secondary,'55')}; color:${COLOR_INK.secondary};">${iconEl(x.icon)}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; font-size:13px;">${x.name}</div>
            <div style="font-size:11px; color:${x.daysLeft<0?'var(--neg)':'var(--text-soft)'}; font-weight:600;">
              ${x.daysLeft<0 ? trf('overdue_by', Math.abs(x.daysLeft)) : x.daysLeft===0 ? tr('due_today') : trf('due_in_days', x.daysLeft)}
            </div>
          </div>
          <button onclick="${x.kind==='recurring'?`logRecurringNow('${x.id}')`:`payInstallment('${x.id}')`}" style="border:none; background:var(--accent-color); color:var(--accent-color-ink); font-family:inherit; font-weight:800; font-size:11px; padding:8px 13px; border-radius:11px; cursor:pointer; flex-shrink:0;">${x.type==='income'?tr('log_income'):tr('pay_now')}</button>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderSafeToSpend(){
  const s = safeToSpendCalc();
  const status = s.safe < 0 ? 'danger' : s.safe < s.cash*0.2 ? 'caution' : 'good';
  const statusColor = status==='danger' ? 'var(--neg)' : status==='caution' ? '#D9A441' : 'var(--pos)';
  const statusText = status==='danger' ? tr('sts_over') : status==='caution' ? tr('sts_tight') : tr('sts_good');
  const breakdownParts = [];
  if(s.billsDue>0) breakdownParts.push(trf('sts_line_bills', fmt(s.billsDue)));
  if(s.installmentDue>0) breakdownParts.push(trf('sts_line_inst', fmt(s.installmentDue)));
  if(s.owed>0) breakdownParts.push(trf('sts_line_owed', fmt(s.owed)));

  return `
  <div style="padding:0 20px 4px;">
    <div class="card fade-in" style="padding:20px 22px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="eyebrow">${tr('safe_to_spend')}</div>
          <div class="serif" style="font-size:clamp(22px,7vw,30px); font-weight:600; margin-top:4px; color:${s.safe<0?'var(--neg)':'var(--text)'}; word-break:break-word;">${s.safe<0?'\u2212':''}${fmt(Math.abs(s.safe))}</div>
        </div>
        <div style="background:${mixAlpha(statusColor,'26')}; color:${statusColor}; font-size:10.5px; font-weight:800; padding:6px 11px; border-radius:10px; flex-shrink:0; margin-top:2px;">${statusText}</div>
      </div>
      ${breakdownParts.length ? `<div style="font-size:11px; color:var(--text-soft); margin-top:12px; line-height:1.7;">${breakdownParts.join('<br>')}</div>` : `<div style="font-size:11px; color:var(--text-soft); margin-top:12px;">${tr('sts_clear')}</div>`}
    </div>
  </div>`;
}

function renderTxRow(t, isLast){
  let icon, label, color, sub;
  if(t.type==='transfer'){
    icon='send'; label = `${walletById(t.walletId)?.name || '—'} → ${walletById(t.toWalletId)?.name || '—'}`;
    color='secondary'; sub = t.note || tr('tab_transfer');
  } else {
    const c = catById(t.categoryId);
    icon = c?.icon || 'circle'; label = c?.name || '—'; color = c?.color || 'primary';
    sub = t.note ? t.note : walletById(t.walletId)?.name || '';
  }
  const time = new Date(t.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  return `

      ${fmtSigned(t.amount, t.type)}
    </div>
  </div>`;
}

/* ---------------- RENDER: TIMELINE ---------------- */
function monthTotalsFor(y, m){
  let income=0, expense=0;
  const catTotals = {};
  const dayHas = {}; // 'YYYY-MM-DD' -> {income:bool, expense:bool}
  state.transactions.forEach(t=>{
    const d = new Date(t.date);
    if(d.getFullYear()!==y || d.getMonth()!==m) return;
    const key = d.toISOString().slice(0,10);
    dayHas[key] = dayHas[key] || {income:false, expense:false};
    if(t.type==='income'){ income += t.amount; dayHas[key].income = true; }
    if(t.type==='expense'){ expense += t.amount; catTotals[t.categoryId]=(catTotals[t.categoryId]||0)+t.amount; dayHas[key].expense = true; }
  });
  return {income, expense, catTotals, dayHas};
}
function renderTlRow(t){
  const time = new Date(t.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  let icon,label,color,sub;
  if(t.type==='transfer'){ icon='send'; label=`${walletById(t.walletId)?.name||'—'} → ${walletById(t.toWalletId)?.name||'—'}`; color='secondary'; sub=t.note||tr('tab_transfer'); }
  else { const c=catById(t.categoryId); icon=c?.icon||'circle'; label=c?.name||'—'; color=c?.color||'primary'; sub = (t.note? t.note+' · ':'') + (walletById(t.walletId)?.name||''); }
  const media = t.photo
    ? `<img src="${t.photo}" class="photo-thumb">`
    : `<div class="icon-chip" style="width:36px;height:36px;background:${mixAlpha(COLORS[color], '55')}; color:${COLOR_INK[color]};">${iconEl(icon)}</div>`;
  return `
  <div class="tl-swipe-wrap">
    <div class="tl-swipe-delete" onclick="deleteTransactionPrompt('${t.id}')">${iconEl('trash-2')}</div>
    <div class="tl-swipe-content tl-row" data-swipe-id="${t.id}">
      <div class="tl-time">${time}</div>
      ${media}
      <div style="flex:1; min-width:0;">
        <div style="font-weight:700; font-size:14px;">${label}</div>
        <div style="font-size:11px; color:var(--text-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${sub}</div>
      </div>
      <div style="font-weight:800; font-size:14px; color:${t.type==='income'?'var(--pos)': t.type==='expense'?'var(--neg)':'var(--text)'};">${fmtSigned(t.amount,t.type)}</div>
    </div>
  </div>`;
}

/* ---------------- SWIPE-TO-DELETE (Timeline rows) ---------------- */
let _openSwipeEl = null;
function closeOpenSwipe(){
  if(_openSwipeEl){
    _openSwipeEl.style.transition = 'transform .25s cubic-bezier(.22,1,.36,1)';
    _openSwipeEl.style.transform = 'translateX(0)';
    _openSwipeEl = null;
  }
}
function attachSwipeHandlers(){
  document.querySelectorAll('.tl-swipe-content').forEach(el=>{
    let startX=0, startY=0, dx=0, decided=false, dragging=false;
    el.addEventListener('pointerdown', (e)=>{
      if(_openSwipeEl && _openSwipeEl!==el) closeOpenSwipe();
      startX = e.clientX; startY = e.clientY; dx=0; decided=false; dragging=false;
      el.style.transition = 'none';
    });
    el.addEventListener('pointermove', (e)=>{
      if(startX===0 && startY===0) return;
      const ddx = e.clientX-startX, ddy = e.clientY-startY;
      if(!decided){
        if(Math.abs(ddx) > 8 && Math.abs(ddx) > Math.abs(ddy)*1.4){
          decided=true; dragging=true;
          try{ el.setPointerCapture(e.pointerId); }catch(err){}
        } else if(Math.abs(ddy) > 8){
          decided=true; dragging=false;
        }
      }
      if(dragging){
        dx = Math.max(-76, Math.min(0, ddx));
        el.style.transform = `translateX(${dx}px)`;
        e.preventDefault();
      }
    });
    const end = ()=>{
      if(dragging){
        el.style.transition = 'transform .25s cubic-bezier(.22,1,.36,1)';
        if(dx < -38){ el.style.transform = 'translateX(-76px)'; _openSwipeEl = el; }
        else { el.style.transform = 'translateX(0)'; if(_openSwipeEl===el) _openSwipeEl=null; }
      }
      startX=0; startY=0; dx=0; decided=false; dragging=false;
    };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
  });
}

function insights(){
  const m0 = monthTotals(0), m1 = monthTotals(1);
  const out = [];
  if(m1.expense>0){
    const diff = Math.round(((m0.expense - m1.expense)/m1.expense)*100);
    if(diff<=-3) out.push({icon:'trending-down', text:trf('insight_less', Math.abs(diff))});
    else if(diff>=3) out.push({icon:'trending-up', text:trf('insight_more', diff)});
  }
  // biggest category
  const cats = Object.entries(m0.catTotals).sort((a,b)=>b[1]-a[1]);
  if(cats.length){
    const top = catById(cats[0][0]);
    out.push({icon:'flame', text:trf('insight_top', top?.name || tr('one_category'), fmt(cats[0][1]))});
  }
  // category vs last month
  Object.keys(m0.catTotals).forEach(cid=>{
    const cur = m0.catTotals[cid]||0, prev = m1.catTotals[cid]||0;
    if(prev>0){
      const d = Math.round(((cur-prev)/prev)*100);
      if(Math.abs(d)>=25){
        const c = catById(cid);
        out.push({icon: d>0?'arrow-up-right':'arrow-down-right', text:trf('insight_cat_change', c?.name, d>0?tr('increased'):tr('decreased'), Math.abs(d))});
      }
    }
  });
  const days = new Date().getDate();
  out.push({icon:'calendar-days', text:trf('insight_avg', fmt(m0.expense/Math.max(1,days)))});
  return out.slice(0,4);
}

function computeProfileStats(){
  // streak: consecutive days (walking back from today) with at least one transaction
  let streak = 0;
  let cursor = new Date(); cursor.setHours(0,0,0,0);
  const daysWithTx = new Set(state.transactions.map(t=> new Date(t.date).toDateString()));
  while(daysWithTx.has(cursor.toDateString())){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }

  // best month: highest net (income - expense) among months that have any transactions
  const byMonth = {};
  state.transactions.forEach(t=>{
    const d = new Date(t.date);
    const key = d.getFullYear()+'-'+d.getMonth();
    byMonth[key] = byMonth[key] || { y:d.getFullYear(), m:d.getMonth(), income:0, expense:0 };
    if(t.type==='income') byMonth[key].income += t.amount;
    if(t.type==='expense') byMonth[key].expense += t.amount;
  });
  let bestMonth = null;
  Object.values(byMonth).forEach(mm=>{
    const net = mm.income - mm.expense;
    if(!bestMonth || net > bestMonth.net) bestMonth = { ...mm, net };
  });

  // favorite category: highest total spend this month
  const mt = monthTotals();
  const catEntries = Object.entries(mt.catTotals).sort((a,b)=>b[1]-a[1]);
  const favoriteCategory = catEntries.length ? catById(catEntries[0][0]) : null;

  return {
    streak,
    walletCount: state.wallets.length,
    txCount: state.transactions.length,
    bestMonth,
    favoriteCategory,
  };
}

// Simple heuristic to push a recurring item's due date forward after it's logged.
// Looks for a number of weeks/months/days/years in the frequency text; defaults to +1 month.
function advanceDate(dateStr, freqText){
  const d = new Date(dateStr + 'T12:00:00');
  const f = (freqText||'').toLowerCase();
  const numMatch = f.match(/(\d+)/);
  const n = numMatch ? parseInt(numMatch[1]) : 1;
  if(f.includes('week')) d.setDate(d.getDate() + 7*n);
  else if(f.includes('day')) d.setDate(d.getDate() + n);
  else if(f.includes('year')) d.setFullYear(d.getFullYear() + n);
  else d.setMonth(d.getMonth() + n); // default: monthly
  return d.toISOString().slice(0,10);
}
window.logRecurringNow = (id)=>{
  const r = state.recurring.find(x=>x.id===id);

  state.transactions.push(tx);
  const prevDue = r.nextDue;
  r.nextDue = advanceDate(r.nextDue || new Date().toISOString().slice(0,10), r.freq);
  state.lastRecurringLog = { recurringId:id, txId:tx.id, prevDue };
  showToast(trf('toast_logged', r.name), 'zap', {label:tr('toast_undo'), onclick:'undoRecurringLog()'});
  render();
};
window.undoRecurringLog = ()=>{
  if(!state.lastRecurringLog) return;
  const { recurringId, txId, prevDue } = state.lastRecurringLog;
  state.transactions = state.transactions.filter(t=>t.id!==txId);
  const r = state.recurring.find(x=>x.id===recurringId);
  if(r) r.nextDue = prevDue;
  state.lastRecurringLog = null;
  document.getElementById('toast').classList.remove('show');

};
function daysUntil(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.round((d-today)/(1000*60*60*24));
}

/* ---------------- BACKUP: shared build/apply + server sync ---------------- */
function buildBackupObject(){
  return {
    version:1, exportedAt:new Date().toISOString(),
    wallets:state.wallets, categories:state.categories, transactions:state.transactions,
    budgets:state.budgets, recurring:state.recurring, goal:state.goal,
    quickItems:state.quickItems, installments:state.installments, loans:state.loans,
    accentKey:state.accentKey, dark:state.dark, lang:state.lang, theme:state.theme,
  };
}
function applyBackup(data){
  if(!data || !Array.isArray(data.wallets) || !Array.isArray(data.transactions) || !Array.isArray(data.categories)) return false;
  state.wallets = data.wallets;
  state.categories = data.categories;
  state.transactions = data.transactions;
  if(Array.isArray(data.budgets)) state.budgets = data.budgets;
  if(Array.isArray(data.recurring)) state.recurring = data.recurring;
  if(data.goal !== undefined) state.goal = data.goal;
  if(Array.isArray(data.quickItems)) state.quickItems = data.quickItems;
  if(Array.isArray(data.installments)) state.installments = data.installments;
  if(Array.isArray(data.loans)) state.loans = data.loans;
  if(data.accentKey){ setAccent(data.accentKey); }
  if(typeof data.dark==='boolean'){ state.dark = data.dark; document.documentElement.classList.toggle('dark', state.dark); }
  if(data.lang){ state.lang = data.lang; document.documentElement.classList.toggle('lang-th', state.lang==='th'); }
  if(data.theme){
    state.theme = data.theme;
    document.documentElement.classList.toggle('theme-playful', state.theme==='playful');
    document.documentElement.classList.toggle('theme-cute', state.theme==='cute');
  }
  return true;
}

// Firebase sync — data is stored per-account in Firestore at users/{uid},
// so it follows you across devices once signed in. Autosaves ~0.9s after
// any change; loads automatically right after sign-in.
let _saveTimer = null;
function scheduleServerSave(){
  if(!state.user || state._loading) return;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveToServer, 900);
}
function saveToServer(){
  if(!state.user) return;
  fbDb.collection('users').doc(state.user.uid).set({
    json: JSON.stringify(buildBackupObject()),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(err=> console.error('save failed', err));
}
function loadFromServer(){
  if(!state.user) return;
  const uidAtRequest = state.user.uid;
  state._loading = true;
  fbDb.collection('users').doc(uidAtRequest).get().then(doc=>{
    if(state.user?.uid !== uidAtRequest) return; // user switched again while this was in flight
    if(doc.exists && doc.data().json){
      const data = JSON.parse(doc.data().json);
      if(applyBackup(data)){
        render();
        showToast(tr('toast_server_loaded'),'database-backup');
      }
    }
  }).catch(err=> console.error('load failed', err))
    .finally(()=>{ if(state.user?.uid === uidAtRequest) state._loading = false; });
}

window.handleImportFile = (input)=>{
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ showToast(tr('err_import_invalid'),'circle-alert'); input.value=''; return; }

    if(!(Array.isArray(data.wallets) && Array.isArray(data.transactions) && Array.isArray(data.categories))){
      showToast(tr('err_import_invalid'),'circle-alert'); input.value=''; return;
    }
    if(!confirm(tr('confirm_import'))){ input.value=''; return; }

    applyBackup(data);
    input.value = '';
    showToast(tr('toast_import_success'),'check');
    render();
  };
  reader.onerror = ()=>{ showToast(tr('err_import_invalid'),'circle-alert'); };
  reader.readAsText(file);
};
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

window.saveTransaction = ()=>{
  const amountRaw = parseFloat(state.addAmount);
  if(!amountRaw || amountRaw<=0){ showToast(tr('err_amount'),'circle-alert'); return; }
  const dateVal = state.addDate;
  const note = state.addNote;
  const now = new Date();
  const d = dateVal ? new Date(dateVal) : now;
  d.setHours(now.getHours(), now.getMinutes());

  if(state.addType==='transfer'){
    if(state.addSelectedWallet===state.addSelectedToWallet){ showToast(tr('err_two_wallets'),'circle-alert'); return; }
    state.transactions.push({id:newId(), type:'transfer', categoryId:'', walletId:state.addSelectedWallet, toWalletId:state.addSelectedToWallet, amount:amountRaw, note, date:d.toISOString(), photo:null});
    showToast(tr('toast_transfer_recorded'),'send');
  } else if(state.addType==='expense' && state.addIsInstallment){
    if(!state.addSelectedCategory){ showToast(tr('err_category'),'circle-alert'); return; }
    const count = parseInt(state.addInstallmentCount);
    if(!count || count<1){ showToast(tr('err_installments_count'),'circle-alert'); return; }
    const perInstallment = Math.round(amountRaw / count);
    const cat = catById(state.addSelectedCategory);
    state.installments.push({
      id:newId(), name: note || cat?.name || tr('new_installment'),
      icon: cat?.icon || 'credit-card', color: cat?.color || 'secondary',
      totalAmount: amountRaw, installments: count, paid: 1,
      categoryId: state.addSelectedCategory, walletId: state.addSelectedWallet,
      nextDue: advanceDate(d.toISOString().slice(0,10), 'Monthly'),
    });
    state.transactions.push({id:newId(), type:'expense', categoryId:state.addSelectedCategory, walletId:state.addSelectedWallet, toWalletId:null, amount:perInstallment, note: note || tr('installment_note_prefix'), date:d.toISOString(), photo:state.addPhoto});
    showToast(tr('toast_installment_started'), 'sparkles');
  } else {
    if(!state.addSelectedCategory){ showToast(tr('err_category'),'circle-alert'); return; }
    state.transactions.push({id:newId(), type:state.addType, categoryId:state.addSelectedCategory, walletId:state.addSelectedWallet, toWalletId:null, amount:amountRaw, note, date:d.toISOString(), photo:state.addPhoto});
    showToast(state.addType==='income' ? tr('toast_income_added') : tr('toast_expense_added'), 'check');
  }
  closeAddSheet();
  render();
};

window.payInstallment = (id)=>{
  const inst = state.installments.find(x=>x.id===id);
  if(!inst || inst.paid>=inst.installments) return;
  const perInst = Math.round(inst.totalAmount / inst.installments);
  const tx = {id:newId(), type:'expense', categoryId:inst.categoryId, walletId:inst.walletId, toWalletId:null, amount:perInst, note:inst.name, date:new Date().toISOString(), photo:null};
  state.transactions.push(tx);
  inst.paid += 1;
  const prevDue = inst.nextDue;
  inst.nextDue = advanceDate(inst.nextDue || new Date().toISOString().slice(0,10), 'Monthly');
  state.lastInstPayment = { instId:id, txId:tx.id, prevDue };
  showToast(trf('toast_logged', inst.name), 'zap', {label:tr('toast_undo'), onclick:'undoInstPayment()'});
  render();
};
window.undoInstPayment = ()=>{
  if(!state.lastInstPayment) return;
  const { instId, txId, prevDue } = state.lastInstPayment;
  state.transactions = state.transactions.filter(t=>t.id!==txId);
  const inst = state.installments.find(x=>x.id===instId);
  if(inst){ inst.paid = Math.max(0, inst.paid-1); inst.nextDue = prevDue; }
  state.lastInstPayment = null;
  document.getElementById('toast').classList.remove('show');
  showToast(tr('toast_removed'),'trash-2');
  render();
};

  scheduleServerSave();
}
function renderTimelineListOnly(){
  // lightweight re-render that preserves focus in search box
  const active = document.activeElement;
  const wasSearch = active && active.id==='tlSearch';
  const caret = wasSearch ? active.selectionStart : null;
  _openSwipeEl = null;
  document.getElementById('content').innerHTML = renderTimeline();
  const s = document.getElementById('tlSearch');
  if(s){
    s.addEventListener('input', (e)=>{ state.timelineFilter.q = e.target.value; renderTimelineListOnly(); });
    if(wasSearch){ s.focus(); s.setSelectionRange(caret, caret); }
  }
  attachSwipeHandlers();
}

document.querySelectorAll('.navbtn').forEach(b=> b.addEventListener('click', ()=> switchTab(b.dataset.tab)));
document.getElementById('fabBtn').addEventListener('click', ()=> openAddSheet('expense'));
document.getElementById('overlay').addEventListener('click', closeAddSheet);
document.getElementById('qiOverlay').addEventListener('click', closeQiSheet);
document.getElementById('instOverlay').addEventListener('click', closeInstSheet);
document.getElementById('loanOverlay').addEventListener('click', closeLoanSheet);

/* ---------------- AUTH ---------------- */
function authErrorMessage(code){
  switch(code){
    case 'auth/invalid-email': return tr('err_auth_invalid_email');
    case 'auth/weak-password': return tr('err_auth_weak_password');
    case 'auth/wrong-password':
    case 'auth/invalid-credential':
    case 'auth/user-not-found': return tr('err_auth_wrong_password');
    case 'auth/email-already-in-use': return tr('err_auth_email_in_use');
    default: return tr('err_auth_generic');
  }
}
window.setAuthMode = (m)=>{ state.authMode = m; state.authError=''; renderAuthScreen(); };
window.doAuth = ()=>{
  const email = (document.getElementById('authEmail')?.value || '').trim();
  const pass = document.getElementById('authPassword')?.value || '';
  if(!email || !pass){ state.authError = tr('err_auth_fill'); renderAuthScreen(); return; }
  state.authBusy = true; state.authError = ''; renderAuthScreen();
  const action = state.authMode==='signup'
    ? fbAuth.createUserWithEmailAndPassword(email, pass)
    : fbAuth.signInWithEmailAndPassword(email, pass);
  action.catch(err=>{
    state.authBusy = false;
    state.authError = authErrorMessage(err.code);
    renderAuthScreen();
  });
};
window.doSignOut = ()=>{ fbAuth.signOut(); };

function renderAuthScreen(){
  const el = document.getElementById('authScreen');
  const su = state.authMode==='signup';
  el.innerHTML = `
    <div style="text-align:center; margin-bottom:28px;">
      <div class="serif" style="font-size:28px; font-weight:600;">Daily Ledger</div>
      <div style="font-size:12.5px; color:var(--text-soft); margin-top:4px;">${tr('app_tagline')}</div>
    </div>
    <div class="segmented" style="margin-bottom:18px;">
      <button class="${!su?'active':''}" onclick="setAuthMode('signin')">${tr('sign_in')}</button>
      <button class="${su?'active':''}" onclick="setAuthMode('signup')">${tr('sign_up')}</button>
    </div>
    <div class="auth-error ${state.authError?'show':''}">${state.authError||''}</div>
    <div class="auth-field">
      ${iconEl('pen-line')}
      <input id="authEmail" type="email" placeholder="${tr('email')}" autocomplete="email">
    </div>
    <div class="auth-field">
      ${iconEl('check')}
      <input id="authPassword" type="password" placeholder="${tr('password')}" autocomplete="${su?'new-password':'current-password'}" onkeydown="if(event.key==='Enter') doAuth()">
    </div>
    <button class="save-btn" onclick="doAuth()" ${state.authBusy?'disabled':''} style="margin-top:6px; opacity:${state.authBusy?'0.6':'1'};">${su?tr('sign_up'):tr('sign_in')}</button>
    <button onclick="setAuthMode('${su?'signin':'signup'}')" style="width:100%; border:none; background:none; color:var(--text-soft); font-family:inherit; font-weight:700; font-size:12.5px; padding:16px; cursor:pointer;">${su?tr('have_account'):tr('no_account')}</button>
  `;
}

function closeAllOverlays(){
  closeAddSheet();
  closeQiSheet();
  closeInstSheet();
  closeLoanSheet();
  closeWalletPage();
}

fbAuth.onAuthStateChanged((user)=>{
  const prevUid = state.user?.uid || null;
  const newUid = user?.uid || null;
  state.user = user;
  closeAllOverlays();

  if(user){
    if(prevUid !== newUid) resetToBlankData(); // clean, empty slate — loadFromServer below fills in real data if this account has any saved
    state._loading = true; // block autosave until loadFromServer resolves — avoids ever saving blank/reset data over real cloud data
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('shell').classList.remove('app-hidden');
    render();
    loadFromServer();
  } else {
    resetToBlankData(); // clear whatever was in memory so the next sign-in starts fresh
    document.getElementById('shell').classList.add('app-hidden');
    document.getElementById('authScreen').classList.remove('hidden');
    renderAuthScreen();
  }
});

render();
</script>
</body>
</html>
